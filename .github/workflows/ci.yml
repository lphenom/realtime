name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # ---------------------------------------------------------------------------
  # PHP matrix: 8.1, 8.2, 8.3
  # ---------------------------------------------------------------------------
  test:
    name: PHP ${{ matrix.php }} — lint + analyse + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, redis
          coverage: none
          tools: composer:2.9.5
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-
      - name: Install dependencies
        # GITHUB_TOKEN is always available in Actions — authenticates Composer for
        # public lphenom/* VCS packages and prevents GitHub API rate-limit errors.
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: PHP-CS-Fixer (lint)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes
      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --memory-limit=256M --no-progress
      - name: PHPUnit (tests)
        run: vendor/bin/phpunit --colors=always
  # ---------------------------------------------------------------------------
  # KPHP binary + PHAR check (runs on PHP 8.1 host with Docker)
  # ---------------------------------------------------------------------------
  kphp-check:
    name: KPHP binary + PHAR check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build KPHP binary + PHAR
        # COMPOSER_AUTH is passed as a build-arg into Dockerfile.check's vendor-build stage.
        # GITHUB_TOKEN is automatic — no secrets configuration required.
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GITHUB_TOKEN }}"}}'
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --build-arg "COMPOSER_AUTH=${COMPOSER_AUTH}" \
            --progress plain \
            -f Dockerfile.check \
            -t lphenom-realtime-check \
            .
