name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # ---------------------------------------------------------------------------
  # PHP matrix: 8.1, 8.2, 8.3
  # ---------------------------------------------------------------------------
  test:
    name: PHP ${{ matrix.php }} — lint + analyse + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH agent (for VCS packages on github.com)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, redis
          coverage: none
          tools: composer:2.9.5
      - name: Add github.com to known_hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: PHP-CS-Fixer (lint)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes
      - name: PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --memory-limit=256M --no-progress
      - name: PHPUnit (tests)
        run: vendor/bin/phpunit --colors=always
  # ---------------------------------------------------------------------------
  # KPHP binary + PHAR check (runs on PHP 8.1 host with Docker)
  # ---------------------------------------------------------------------------
  kphp-check:
    name: KPHP binary + PHAR check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Build KPHP binary + PHAR
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --ssh default \
            --progress plain \
            -f Dockerfile.check \
            -t lphenom-realtime-check \
            .
